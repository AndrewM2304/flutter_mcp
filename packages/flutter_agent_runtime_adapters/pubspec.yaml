name: flutter_agent_runtime_adapters
description: Riverpod, GoRouter, and Talker adapters for Flutter Agent Runtime.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_agent_runtime:
    path: ../flutter_agent_runtime
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  talker: ^5.1.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^4.0.0
